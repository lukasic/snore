name: Build & Publish Docker Images

on:
  push:
    branches: ["**"]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check backend changes
        id: changes
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -qE '^backend/|^\.github/workflows/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        if: steps.changes.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build args
        if: steps.changes.outputs.changed == 'true'
        id: vars
        run: |
          echo "commit_msg=$(git log -1 --format='%B' ${{ github.sha }} | tr '\n' ' ' | sed 's/"/\\"/g' | sed 's/\$/\\$/g')" >> $GITHUB_OUTPUT
          echo "commit_count=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT

      - name: Extract metadata (labels)
        if: steps.changes.outputs.changed == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=snore-backend
            org.opencontainers.image.description=Snore backend service
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created={{date 'YYYY-MM-DDTHH:mm:ssZ'}}
            org.opencontainers.image.ref.name=${{ github.ref_name }}

      - name: Set up Docker Buildx
        if: steps.changes.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        if: steps.changes.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT_SHA=${{ github.sha }}
            GIT_COMMIT_SHORT_SHA=${{ steps.vars.outputs.short_sha }}
            GIT_COMMIT_TIME=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT_INFO=${{ steps.vars.outputs.commit_msg }}
            GIT_COMMIT_COUNT=${{ steps.vars.outputs.commit_count }}
            GIT_COMMIT_BRANCH=${{ github.ref_name }}
            GITLAB_PIPELINE_ID=${{ github.run_id }}
            GITLAB_PIPELINE_IID=${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check frontend changes
        id: changes
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -qE '^frontend/|^\.github/workflows/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        if: steps.changes.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build args
        if: steps.changes.outputs.changed == 'true'
        id: vars
        run: |
          echo "commit_msg=$(git log -1 --format='%B' ${{ github.sha }} | tr '\n' ' ' | sed 's/"/\\"/g' | sed 's/\$/\\$/g')" >> $GITHUB_OUTPUT
          echo "commit_count=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT

      - name: Extract metadata (labels)
        if: steps.changes.outputs.changed == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=snore-frontend
            org.opencontainers.image.description=Snore frontend service
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created={{date 'YYYY-MM-DDTHH:mm:ssZ'}}
            org.opencontainers.image.ref.name=${{ github.ref_name }}

      - name: Set up Docker Buildx
        if: steps.changes.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        if: steps.changes.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT_SHA=${{ github.sha }}
            GIT_COMMIT_SHORT_SHA=${{ steps.vars.outputs.short_sha }}
            GIT_COMMIT_TIME=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT_INFO=${{ steps.vars.outputs.commit_msg }}
            GIT_COMMIT_COUNT=${{ steps.vars.outputs.commit_count }}
            GIT_COMMIT_BRANCH=${{ github.ref_name }}
            GITLAB_PIPELINE_ID=${{ github.run_id }}
            GITLAB_PIPELINE_IID=${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

