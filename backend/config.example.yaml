secret_key: "change-me-use-a-long-random-string"

redis:
  url: "redis://localhost:6379"

users:
  - username: admin
    # Generate a hash: make hash PW=yourpassword
    password_hash: "$2b$12$SZp37jd6OyhDdvNWfj7TceS8PxdIaxHn/0BQ6MFOYwRPcLxFG7cyi"  # hash of "admin" - change in production!
    queues: []
    notifications: []

  - username: alice
    password_hash: "$2b$12$SZp37jd6OyhDdvNWfj7TceS8PxdIaxHn/0BQ6MFOYwRPcLxFG7cyi"  # hash of "admin" - change in production!
    queues:
      - general
    notifications:
      - type: pushover
        user_key: "your-pushover-user-key"
        api_token: "your-pushover-api-token"
      - type: pagerduty
        integration_key: "your-pagerduty-integration-key"

queues:
  - name: general
    flush_after_minutes: 5
    routing_rules: []

  - name: windows
    flush_after_minutes: 10
    routing_rules:
      - match_host: "win-*"
      - match_service: "IIS*"

  - name: icinga-prod
    flush_after_minutes: 5
    routing_rules:
      - match_source: "icinga2.prod"

notifications:
  slack_webhook: ""  # "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"
