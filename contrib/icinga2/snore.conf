/**
 * SNORE notification integration for Icinga2
 *
 * Setup:
 *   1. Copy notify-snore.py to /etc/icinga2/scripts/notify-snore.py
 *   2. chmod +x /etc/icinga2/scripts/notify-snore.py
 *   3. Include this file or copy it to /etc/icinga2/conf.d/snore.conf
 *   4. Apply the snore-notifications template to your hosts/services,
 *      or assign it via an apply rule (see examples at the bottom).
 */


// ---------------------------------------------------------------------------
// Notification commands
// ---------------------------------------------------------------------------

object NotificationCommand "snore-service" {
    command = [ "/etc/icinga2/scripts/notify-snore.py" ]

    env = {
        SNORE_URL               = "$snore_url$"
        SNORE_SOURCE            = "$snore_source$"
        ICINGA_NOTIFICATIONTYPE = "$notification.type$"
        ICINGA_HOSTNAME         = "$host.name$"
        ICINGA_SERVICEDESC      = "$service.name$"
        ICINGA_SERVICESTATE     = "$service.state$"
        ICINGA_SERVICEOUTPUT    = "$service.output$"
    }
}

object NotificationCommand "snore-host" {
    command = [ "/etc/icinga2/scripts/notify-snore.py" ]

    env = {
        SNORE_URL               = "$snore_url$"
        SNORE_SOURCE            = "$snore_source$"
        ICINGA_NOTIFICATIONTYPE = "$notification.type$"
        ICINGA_HOSTNAME         = "$host.name$"
        ICINGA_HOSTSTATE        = "$host.state$"
        ICINGA_HOSTOUTPUT       = "$host.output$"
    }
}


// ---------------------------------------------------------------------------
// Notification templates
// ---------------------------------------------------------------------------

template Notification "snore-service-notification" {
    command = "snore-service"

    // Override these per-host/service or in a more specific template:
    vars.snore_url    = "https://snore.example.com"
    vars.snore_source = "icinga2"

    states  = [ Warning, Critical, Unknown ]
    types   = [ Problem, Custom ]

    period = "24x7"
}

template Notification "snore-host-notification" {
    command = "snore-host"

    vars.snore_url    = "https://snore.example.com"
    vars.snore_source = "icinga2"

    states  = [ Down, Unreachable ]
    types   = [ Problem, Custom ]

    period = "24x7"
}


// ---------------------------------------------------------------------------
// Apply rules (optional — adjust the assign condition to your needs)
// ---------------------------------------------------------------------------

